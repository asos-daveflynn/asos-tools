name: Deploy Research Buddy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "research-buddy/**"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: research-buddy/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: research-buddy

      - name: Build
        run: npm run build
        working-directory: research-buddy

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: research-buddy/dist

      - id: deployment
        uses: actions/deploy-pages@v4
